<section id="envelopeSection" class="screen">
  <div id="mobileEnvelopeBg" class="mobile-envelope-bg"></div>

  <div class="scene">
    <div class="scene-bg"></div>

    <div id="envelopeFigure" class="envelope-figure">
      <!-- DESKTOP ONLY -->
      <img src="Envelope-desktop.png" alt="" class="env-layer desktop-layer envelope-body" />
      <img src="inner-desktop.png" alt="" class="env-layer desktop-layer inner-layer" />
      <img src="flap-desktop.png" alt="" class="env-layer desktop-layer flap-layer" />
      <img src="seal-desktop.png" alt="" class="env-layer desktop-layer seal-image desktop-seal" />

      <!-- MOBILE ONLY -->
      <img src="seal-mobile_full.png" alt="" class="mobile-layer seal-image mobile-seal" />

      <button
        id="sealButton"
        class="seal-button"
        type="button"
        aria-label="Open invitation"
      ></button>
    </div>

    <div id="cascadeLayer" class="cascade-layer" aria-hidden="true">
      <img src="transition-cascade.png" alt="" class="cascade-image" />
      <div id="fallingFlowers" class="falling-flowers"></div>
    </div>

    <div id="whiteFlash" class="white-flash" aria-hidden="true"></div>
  </div>
</section>
